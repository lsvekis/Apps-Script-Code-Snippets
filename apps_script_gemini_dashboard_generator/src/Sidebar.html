<!DOCTYPE html>
<html>
<head><base target="_top"></head>
<body style="font-family:Arial;padding:14px;">
  <h2>AI Dashboard Generator</h2>
  <label><b>Describe the dashboard you want</b></label>
  <textarea id="prompt" style="width:100%;height:90px;">Example: Create a dashboard with revenue by region and monthly sales trend</textarea>
  <button onclick="generate()">Generate Dashboard</button>
  <pre id="output" style="white-space:pre-wrap;margin-top:12px;"></pre>
  <script>
    function generate() {
      document.getElementById("output").textContent = "Building dashboard...";
      google.script.run
        .withSuccessHandler(function(res){ document.getElementById("output").textContent = res; })
        .generateDashboard(document.getElementById("prompt").value);
    }
  </script>
</body>
</html>
