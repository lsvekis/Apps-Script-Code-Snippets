<!DOCTYPE html>
<html>
<head><base target="_top"></head>
<body style="font-family:Arial;padding:14px;">
  <h2>AI Chart Builder</h2>
  <label><b>Describe the chart you want</b></label>
  <textarea id="prompt" style="width:100%;height:90px;">Example: Create a bar chart showing revenue by region</textarea>
  <button onclick="generate()">Create Chart</button>
  <pre id="output" style="white-space:pre-wrap;margin-top:12px;"></pre>
  <script>
    function generate() {
      document.getElementById("output").textContent = "Creating chart...";
      google.script.run
        .withSuccessHandler(function(res){ document.getElementById("output").textContent = res; })
        .generateChart(document.getElementById("prompt").value);
    }
  </script>
</body>
</html>
